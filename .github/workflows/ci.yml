name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: No symlinks in tree
        run: |
          bad=$(git ls-files -s | awk '$1 == 120000 {print $4}')
          if [ -n "$bad" ]; then
            echo "Symlinks must not be committed to this repo (see 874acda incident):"
            echo "$bad"
            exit 1
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Lint (ruff check)
        run: uv run ruff check src

      - name: Format check (ruff format)
        run: uv run ruff format --check src

      - name: Type check (mypy)
        run: uv run mypy src

      - name: Security (bandit)
        run: uv run bandit -r src/ -ll

      - name: Secret scan (detect-secrets)
        run: uv run detect-secrets scan --baseline .secrets.baseline

      - name: Dependency audit (pip-audit)
        run: uv run pip-audit

      - name: Test (pytest)
        run: uv run pytest

      - name: Docs (sphinx-build -W)
        run: uv run sphinx-build -W -b html docs docs/_build/html
