# Example declarative eval run config: a multi-subagent CVE collection task.
#
# Run it with:
#
#   my-coding-agent-eval run --config examples/eval_run_cve_subagents.yaml
#
# Exit codes: 2 if the config fails validation (no agent run happens),
# 0 if every check passes, 1 if any check fails.
#
# Combines all three registered evaluators: `exact_match` (substring checks
# on the final output), `trajectory` (scores the run's execution path — tool
# selection, argument validity, error handling, efficiency — not its answer),
# and `judge` (rubric-graded LLM judgment). The judge check's rubric is
# declared inline below so this config is a single self-contained file — see
# examples/eval_run_cve_subagents_rubric_path.yaml for the equivalent
# path-referenced form, useful when the same rubric is reused across configs.

llm:
  api_url: http://127.0.0.1:8321/v1
  model: Qwen3.6-35B-A3B-6bit
  api_key_env: OMLX_API_KEY  # pragma: allowlist secret
  timeout: 30

run:
  system_prompt: "You are a coding assistant completing a single evaluation task."
  task: |
    Use subagents to achieve this task:
    subagent1: collect the most recently added CVEs in the CISA KEV database via https://vulnerability.circl.lu/api/cisa_kev/ (expected_report: the CVE ids and summary you found, as a short list)
    subagent2: collect the most recently added CVEs in the GitHub Advisories database via https://api.github.com/advisories (expected_report: the CVE ids and summary you found, as a short list)
    Then summarize both into one markdown table.
  max_steps: 30

evaluation:
  checks:
    - name: has-cve-id
      evaluator: exact_match
      expected: { contains: "CVE-" }
    - name: has-markdown-table
      evaluator: exact_match
      expected: { contains: "|" }
    - name: trajectory-quality
      evaluator: trajectory
      expected: { pass_threshold: 0.7 }
    - name: judged-aggregation-quality
      evaluator: judge
      expected:
        rubric:
          name: cve_aggregation_rubric
          scale: { min: 1, max: 5 }
          criteria:
            - name: subagent_delegation
              description: >-
                Were both CVE lookups delegated to two separate subagents,
                rather than performed inline by the main agent? Look for two
                distinct reports in the final answer, one per source, rather
                than a single undifferentiated block of research.
              anchors:
                "1": "Both lookups appear to have been done directly by the main agent; no evidence of delegation."
                "3": "Only one of the two lookups shows clear evidence of subagent delegation."
                "5": "Both lookups show clear evidence of having been delegated to separate subagents."
            - name: source_correctness
              description: >-
                Does the CISA KEV portion of the answer reflect the
                vulnerability.circl.lu CISA KEV endpoint, and does the GitHub
                Advisories portion reflect the api.github.com advisories
                endpoint, without either being substituted, guessed, or
                fabricated?
              anchors:
                "1": "Neither source is correctly grounded; content appears fabricated or from the wrong source."
                "3": "One source is correctly grounded, the other is substituted, guessed, or fabricated."
                "5": "Both sources are correctly grounded in their assigned endpoint with plausible, source-consistent CVE data."
            - name: synthesis_quality
              description: >-
                Does the final answer contain one well-formed markdown table
                combining rows from both sources?
              anchors:
                "1": "No markdown table, or a table containing only one source's data."
                "3": "A markdown table exists but is malformed, missing a source's rows, or hard to read."
                "5": "One well-formed markdown table with rows drawn from both sources."
        pass_threshold: 4
