repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args: ["-r", "-ll"]
        files: ^src/

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets

  - repo: local
    hooks:
      - id: commit-subject-length
        name: commit subject max 72 chars
        entry: python3 -c "import sys; s=open(sys.argv[1]).readline().rstrip(chr(10)); n=len(s); print(chr(10).join([f'Commit subject is {n} chars, max 72 allowed.', s])) if n > 72 else None; sys.exit(1 if n > 72 else 0)"
        language: system
        stages: [commit-msg]

      - id: commit-subject-format
        name: commit subject must follow Conventional Commits format
        entry: python3 .hooks/check_commit_subject_format.py
        language: system
        stages: [commit-msg]

      - id: commit-body-required
        name: commit body must explain why
        entry: python3 .hooks/check_commit_body.py
        language: system
        stages: [commit-msg]

      - id: commit-refs-footer
        name: "commit message must include a Refs: footer"
        entry: python3 .hooks/check_commit_refs_footer.py
        language: system
        stages: [commit-msg]

      - id: pytest
        name: run test suite
        entry: uv run pytest
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: conformity-report
        name: conformity report approved
        entry: python3 .hooks/check_conformity_report.py
        language: system
        pass_filenames: false
        stages: [pre-commit]
