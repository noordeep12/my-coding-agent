[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "my-coding-agent"
version = "0.1.0"
description = "Minimal Python agent for local LLMs with decorator-based tool calling"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "click>=8.1",
    "colorama>=0.4.6",
    "html2text>=2025.4.15",
    "httpx>=0.28.1",
    "python-dotenv>=1.0",
    "rich>=15.0.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/my_coding_agent"]
